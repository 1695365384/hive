<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 蜂巢金色渐变 -->
    <linearGradient id="honeyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>

    <!-- 科技青色渐变 - 用于点缀 -->
    <linearGradient id="techAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 内发光 -->
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- 蜂巢六边形网格 - 像素风格 -->
  <g filter="url(#glow)">

    <!-- 中心六边形 -->
    <polygon points="100,45 130,62 130,96 100,113 70,96 70,62"
             fill="url(#honeyGradient)" opacity="0.95"/>

    <!-- 左上六边形 -->
    <polygon points="55,62 85,79 85,113 55,130 25,113 25,79"
             fill="url(#honeyGradient)" opacity="0.7"/>

    <!-- 右上六边形 -->
    <polygon points="145,62 175,79 175,113 145,130 115,113 115,79"
             fill="url(#honeyGradient)" opacity="0.7"/>

    <!-- 左下六边形 -->
    <polygon points="55,113 85,130 85,164 55,181 25,164 25,130"
             fill="url(#honeyGradient)" opacity="0.5"/>

    <!-- 右下六边形 -->
    <polygon points="145,113 175,130 175,164 145,181 115,164 115,130"
             fill="url(#honeyGradient)" opacity="0.5"/>

    <!-- 底部六边形 -->
    <polygon points="100,82 130,99 130,133 100,150 70,133 70,99"
             fill="url(#honeyGradient)" opacity="0.6"/>

  </g>

  <!-- 像素化边框装饰 -->
  <g fill="#fbbf24" opacity="0.8">
    <!-- 顶部像素点 -->
    <rect x="97" y="35" width="6" height="6"/>
    <rect x="91" y="41" width="6" height="6"/>
    <rect x="103" y="41" width="6" height="6"/>

    <!-- 左侧像素点 -->
    <rect x="15" y="73" width="6" height="6"/>
    <rect x="21" y="67" width="6" height="6"/>
    <rect x="15" y="124" width="6" height="6"/>
    <rect x="21" y="130" width="6" height="6"/>

    <!-- 右侧像素点 -->
    <rect x="179" y="73" width="6" height="6"/>
    <rect x="173" y="67" width="6" height="6"/>
    <rect x="179" y="124" width="6" height="6"/>
    <rect x="173" y="130" width="6" height="6"/>

    <!-- 底部像素点 -->
    <rect x="97" y="172" width="6" height="6"/>
    <rect x="91" y="178" width="6" height="6"/>
    <rect x="103" y="178" width="6" height="6"/>
  </g>

  <!-- 中心连接点 - 代表 AI 核心 (科技感) -->
  <circle cx="100" cy="79" r="8" fill="#fff" opacity="0.95" filter="url(#innerGlow)"/>
  <circle cx="100" cy="79" r="5" fill="url(#techAccent)" opacity="0.9"/>

  <!-- 连接线 - 网络效果 (科技感点缀) -->
  <g stroke="url(#techAccent)" stroke-width="1.5" opacity="0.7" filter="url(#glow)">
    <line x1="100" y1="79" x2="55" y2="96"/>
    <line x1="100" y1="79" x2="145" y2="96"/>
    <line x1="100" y1="79" x2="100" y2="116"/>
    <line x1="100" y1="79" x2="70" y2="62"/>
    <line x1="100" y1="79" x2="130" y2="62"/>
  </g>

  <!-- 小节点 - 分布式网络 -->
  <g fill="#fff" opacity="0.9">
    <circle cx="55" cy="96" r="3"/>
    <circle cx="145" cy="96" r="3"/>
    <circle cx="100" cy="116" r="3"/>
    <circle cx="70" cy="62" r="3"/>
    <circle cx="130" cy="62" r="3"/>
  </g>

  <!-- 闪烁像素点装饰 -->
  <g fill="#8b5cf6" opacity="0.8">
    <rect x="40" y="50" width="4" height="4"/>
    <rect x="156" y="50" width="4" height="4"/>
    <rect x="30" y="140" width="4" height="4"/>
    <rect x="166" y="140" width="4" height="4"/>
    <rect x="100" y="155" width="4" height="4"/>
  </g>

  <!-- 文字 HIVE -->
  <text x="100" y="195"
        font-family="'Courier New', monospace"
        font-size="14"
        font-weight="bold"
        fill="url(#honeyGradient)"
        text-anchor="middle"
        letter-spacing="4"
        filter="url(#glow)">
    HIVE
  </text>
</svg>
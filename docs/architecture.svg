<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 920" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .layer-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
    .layer-box { fill: #0d1117; stroke-width: 1; rx: 12; }
    .section-title { font-size: 13px; font-weight: 600; }
    .mono { font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace; font-size: 11px; }
    .small { font-size: 11px; }
    .xs { font-size: 10px; }
    .route { font-family: 'SF Mono', SFMono-Regular, Consolas, monospace; font-size: 10px; }
  </style>

  <!-- CLIENT LAYER -->
  <rect class="layer-box" x="10" y="10" width="840" height="76" stroke="#1f6feb33"/>
  <text class="layer-label" x="30" y="28" fill="#58a6ff">Client Layer</text>
  <!-- Desktop -->
  <rect x="50" y="38" width="160" height="36" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="70" y="55" font-size="14">🖥️</text>
  <text x="90" y="53" font-size="13" font-weight="600" fill="#e6edf3">Desktop</text>
  <text x="90" y="66" class="small" fill="#8b949e">Tauri 2 + React 19</text>
  <!-- External API -->
  <rect x="230" y="38" width="160" height="36" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="250" y="55" font-size="14">🌐</text>
  <text x="270" y="53" font-size="13" font-weight="600" fill="#e6edf3">External API</text>
  <text x="270" y="66" class="small" fill="#8b949e">REST / WebSocket</text>
  <!-- CLI -->
  <rect x="410" y="38" width="130" height="36" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="430" y="55" font-size="14">⌨️</text>
  <text x="450" y="53" font-size="13" font-weight="600" fill="#e6edf3">CLI</text>
  <text x="450" y="66" class="small" fill="#8b949e">Terminal</text>
  <!-- Plugins -->
  <rect x="560" y="38" width="160" height="36" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="580" y="55" font-size="14">🔌</text>
  <text x="600" y="53" font-size="13" font-weight="600" fill="#e6edf3">Plugins</text>
  <text x="600" y="66" class="small" fill="#8b949e">Feishu / Slack / Custom</text>

  <!-- Flow arrow 1 -->
  <text x="410" y="104" text-anchor="middle" fill="#484f58" font-size="12" letter-spacing="4">▼ ▼ ▼ ▼</text>

  <!-- SERVER LAYER -->
  <rect class="layer-box" x="10" y="115" width="840" height="108" stroke="#8b5cf633"/>
  <text class="layer-label" x="30" y="133" fill="#a78bfa">Server Layer</text>
  <!-- Gateway box -->
  <rect x="40" y="140" width="780" height="70" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="158" class="section-title" fill="#a78bfa">⚡ Hono HTTP + WebSocket Gateway</text>
  <text x="420" y="158" class="small" fill="#8b949e">port 4450</text>
  <!-- Routes -->
  <text x="60" y="178" class="route" fill="#3fb950" font-weight="600">GET</text>
  <text x="82" y="178" class="route" fill="#8b949e">/health</text>
  <text x="155" y="178" class="route" fill="#d29922" font-weight="600">POST</text>
  <text x="182" y="178" class="route" fill="#8b949e">/api/chat</text>
  <text x="255" y="178" class="route" fill="#3fb950" font-weight="600">GET</text>
  <text x="278" y="178" class="route" fill="#8b949e">/api/sessions</text>
  <text x="370" y="178" class="route" fill="#58a6ff" font-weight="600">WS</text>
  <text x="393" y="178" class="route" fill="#8b949e">/ws/chat</text>
  <text x="462" y="178" class="route" fill="#58a6ff" font-weight="600">WS</text>
  <text x="485" y="178" class="route" fill="#8b949e">/ws/admin</text>
  <text x="570" y="178" class="route" fill="#d29922" font-weight="600">POST</text>
  <text x="600" y="178" class="route" fill="#8b949e">/webhook/:plugin/:appId</text>
  <text x="735" y="178" class="route" fill="#d29922" font-weight="600">POST</text>
  <text x="765" y="178" class="route" fill="#8b949e">/api/upload</text>
  <!-- Middleware -->
  <text x="430" y="200" text-anchor="middle" class="small" fill="#8b949e">CORS · Auth (Bearer) · Logger (pino) · FileHandler · Max 10k sessions (LRU)</text>

  <!-- Flow arrow 2 -->
  <text x="410" y="240" text-anchor="middle" fill="#484f58" font-size="12" letter-spacing="4">▼ ▼ ▼</text>

  <!-- AGENT LAYER -->
  <rect class="layer-box" x="10" y="250" width="840" height="360" stroke="#f9731633"/>
  <text class="layer-label" x="30" y="268" fill="#f97316">Agent Layer</text>

  <!-- Agent entry -->
  <rect x="250" y="280" width="100" height="34" rx="8" fill="url(#orangeGrad)"/>
  <text x="300" y="302" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Agent</text>

  <!-- Arrow -->
  <text x="365" y="302" fill="#f97316" font-size="18">→</text>

  <!-- Coordinator -->
  <rect x="385" y="278" width="260" height="38" rx="8" fill="#161b22" stroke="#f9731633" stroke-width="1.5"/>
  <text x="515" y="294" text-anchor="middle" font-size="14" font-weight="700" fill="#f97316">CoordinatorCapability</text>
  <text x="515" y="308" text-anchor="middle" class="small" fill="#8b949e">LLM Loop · Worker Orchestration · Cost Tracking</text>

  <!-- Workers -->
  <!-- explore -->
  <rect x="60" y="335" width="220" height="88" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="170" y="356" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">🔍 explore</text>
  <rect x="80" y="365" width="36" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="98" y="377" text-anchor="middle" class="xs" fill="#3fb950">file</text>
  <rect x="122" y="365" width="34" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="139" y="377" text-anchor="middle" class="xs" fill="#3fb950">glob</text>
  <rect x="162" y="365" width="36" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="180" y="377" text-anchor="middle" class="xs" fill="#3fb950">grep</text>
  <rect x="204" y="365" width="32" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="220" y="377" text-anchor="middle" class="xs" fill="#3fb950">web</text>
  <rect x="80" y="387" width="28" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="94" y="399" text-anchor="middle" class="xs" fill="#3fb950">env</text>
  <rect x="114" y="404" width="100" height="14" rx="7" fill="#0d2818"/>
  <text x="164" y="414" text-anchor="middle" class="xs" fill="#3fb950" font-weight="500">read-only · 10 turns</text>

  <!-- plan -->
  <rect x="300" y="335" width="220" height="88" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="410" y="356" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">📋 plan</text>
  <rect x="320" y="365" width="36" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="338" y="377" text-anchor="middle" class="xs" fill="#3fb950">file</text>
  <rect x="362" y="365" width="34" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="379" y="377" text-anchor="middle" class="xs" fill="#3fb950">glob</text>
  <rect x="402" y="365" width="36" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="420" y="377" text-anchor="middle" class="xs" fill="#3fb950">grep</text>
  <rect x="444" y="365" width="32" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="460" y="377" text-anchor="middle" class="xs" fill="#3fb950">web</text>
  <rect x="320" y="387" width="28" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="334" y="399" text-anchor="middle" class="xs" fill="#3fb950">env</text>
  <rect x="355" y="404" width="100" height="14" rx="7" fill="#0d2818"/>
  <text x="405" y="414" text-anchor="middle" class="xs" fill="#3fb950" font-weight="500">read-only · 15 turns</text>

  <!-- general -->
  <rect x="540" y="335" width="240" height="88" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="660" y="356" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">⚡ general</text>
  <rect x="560" y="365" width="34" height="16" rx="3" fill="#2d1600" stroke="#6e4b00"/>
  <text x="577" y="377" text-anchor="middle" class="xs" fill="#d29922">bash</text>
  <rect x="600" y="365" width="40" height="16" rx="3" fill="#2d1600" stroke="#6e4b00"/>
  <text x="620" y="377" text-anchor="middle" class="xs" fill="#d29922">file✏️</text>
  <rect x="646" y="365" width="34" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="663" y="377" text-anchor="middle" class="xs" fill="#3fb950">glob</text>
  <rect x="686" y="365" width="36" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="704" y="377" text-anchor="middle" class="xs" fill="#3fb950">grep</text>
  <rect x="728" y="365" width="28" height="16" rx="3" fill="#0d2818" stroke="#238636"/>
  <text x="742" y="377" text-anchor="middle" class="xs" fill="#3fb950">web</text>
  <rect x="560" y="387" width="40" height="16" rx="3" fill="#2d1600" stroke="#6e4b00"/>
  <text x="580" y="399" text-anchor="middle" class="xs" fill="#d29922">ask-user</text>
  <rect x="606" y="387" width="56" height="16" rx="3" fill="#2d1600" stroke="#6e4b00"/>
  <text x="634" y="399" text-anchor="middle" class="xs" fill="#d29922">send-file</text>
  <rect x="595" y="404" width="118" height="14" rx="7" fill="#2d1600"/>
  <text x="654" y="414" text-anchor="middle" class="xs" fill="#d29922" font-weight="500">full access · 15 turns</text>

  <!-- Capabilities -->
  <line x1="40" y1="440" x2="820" y2="440" stroke="#21262d"/>
  <text x="410" y="458" text-anchor="middle" font-size="11" fill="#8b949e" text-transform="uppercase" letter-spacing="1px">Capabilities</text>
  <rect x="60" y="468" width="115" height="24" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="75" y="484" font-size="12" font-weight="600" fill="#e6edf3">Provider</text>
  <text x="148" y="484" class="xs" fill="#8b949e">13 providers</text>
  <rect x="185" y="468" width="95" height="24" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="200" y="484" font-size="12" font-weight="600" fill="#e6edf3">Skill</text>
  <text x="258" y="484" class="xs" fill="#8b949e">match</text>
  <rect x="290" y="468" width="110" height="24" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="305" y="484" font-size="12" font-weight="600" fill="#e6edf3">Session</text>
  <text x="368" y="484" class="xs" fill="#8b949e">SQLite</text>
  <rect x="410" y="468" width="110" height="24" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="425" y="484" font-size="12" font-weight="600" fill="#e6edf3">Timeout</text>
  <text x="486" y="484" class="xs" fill="#8b949e">heartbeat</text>
  <rect x="530" y="468" width="110" height="24" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="545" y="484" font-size="12" font-weight="600" fill="#e6edf3">Schedule</text>
  <text x="608" y="484" class="xs" fill="#8b949e">cron</text>
  <rect x="650" y="468" width="100" height="24" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="665" y="484" font-size="12" font-weight="600" fill="#e6edf3">Hook</text>
  <text x="715" y="484" class="xs" fill="#8b949e">intercept</text>
  <rect x="760" y="468" width="90" height="24" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="775" y="484" font-size="12" font-weight="600" fill="#e6edf3">Compress</text>
  <text x="838" y="484" class="xs" fill="#8b949e">hybrid</text>

  <!-- Flow arrow 3 -->
  <text x="410" y="515" text-anchor="middle" fill="#484f58" font-size="12" letter-spacing="4">▼ ▼ ▼</text>

  <!-- INFRASTRUCTURE LAYER -->
  <rect class="layer-box" x="10" y="525" width="840" height="220" stroke="#484f5833"/>
  <text class="layer-label" x="30" y="543" fill="#8b949e">Infrastructure</text>

  <!-- Provider Adapters -->
  <rect x="30" y="555" width="260" height="110" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="50" y="575" font-size="12" font-weight="600" fill="#e6edf3">🤖 Provider Adapters (7)</text>
  <text x="60" y="593" class="small" fill="#8b949e">AnthropicAdapter</text>
  <text x="60" y="607" class="small" fill="#8b949e">OpenAIAdapter</text>
  <text x="60" y="621" class="small" fill="#8b949e">GoogleAdapter</text>
  <text x="170" y="593" class="small" fill="#8b949e">DeepSeekAdapter</text>
  <text x="170" y="607" class="small" fill="#8b949e">MistralAdapter</text>
  <text x="170" y="621" class="small" fill="#8b949e">XaiAdapter</text>
  <text x="170" y="635" class="small" fill="#8b949e">OpenAICompatible</text>
  <text x="50" y="653" class="xs" fill="#484f58">→ GLM · Qwen · Kimi · ERNIE · OpenRouter · Groq · LiteLLM</text>

  <!-- Storage -->
  <rect x="305" y="555" width="230" height="110" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="325" y="575" font-size="12" font-weight="600" fill="#e6edf3">🗄️ Storage</text>
  <text x="335" y="593" class="small" fill="#8b949e">SQLite sessions</text>
  <text x="335" y="607" class="small" fill="#8b949e">SQLite schedules</text>
  <text x="335" y="621" class="small" fill="#8b949e">File uploads (10MB max)</text>
  <text x="335" y="635" class="small" fill="#8b949e">In-memory cache</text>
  <text x="335" y="653" class="xs" fill="#484f58">Compression: hybrid / summary / sliding-window</text>

  <!-- Built-in Tools -->
  <rect x="550" y="555" width="280" height="110" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="570" y="575" font-size="12" font-weight="600" fill="#e6edf3">🔧 Built-in Tools (14)</text>
  <text x="580" y="593" class="small" fill="#8b949e">bash · file · glob · grep</text>
  <text x="580" y="607" class="small" fill="#8b949e">web-search · web-fetch · env</text>
  <text x="580" y="621" class="small" fill="#8b949e">ask-user · send-file · schedule</text>
  <text x="580" y="635" class="small" fill="#8b949e">agent · task-stop · send-message</text>
  <text x="570" y="653" class="xs" fill="#484f58">Path constraints · SSRF protection · Command allowlist</text>

  <!-- Security bar -->
  <rect x="40" y="680" width="780" height="28" rx="8" fill="#161b22" stroke="#23863633"/>
  <text x="60" y="698" font-size="11" fill="#3fb950">🛡️</text>
  <text x="78" y="698" font-size="11" fill="#e6edf3" font-weight="600">Security:</text>
  <text x="148" y="698" font-size="11" fill="#8b949e">Path constraints · SSRF protection · Command allowlist (14 patterns) · Sensitive file guard (.env, .ssh, .pem) · Hook intercept</text>

  <!-- Legend -->
  <text x="230" y="730" text-anchor="middle" font-size="10" fill="#484f58" letter-spacing="1">
    ● read-only tool    ● write tool    ● agent entry    ● server gateway    ● client interface
  </text>
  <rect x="230" y="737" width="12" height="3" rx="1" fill="#3fb950"/>
  <rect x="310" y="737" width="12" height="3" rx="1" fill="#d29922"/>
  <rect x="388" y="737" width="12" height="3" rx="1" fill="#f97316"/>
  <rect x="478" y="737" width="12" height="3" rx="1" fill="#a78bfa"/>
  <rect x="570" y="737" width="12" height="3" rx="1" fill="#58a6ff"/>

  <!-- Gradient -->
  <defs>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
</svg>

<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!--
    Claude Agent Service Icon

    设计理念：
    - 中央的 "A" 代表 Agent，采用不规则的几何切割
    - 周围的连接点代表多提供商网络
    - 流动的线条代表工作流和智能响应
    - 暖橙色调 + 深灰，避免 AI 生成的紫蓝渐变感
  -->

  <defs>
    <!-- 背景渐变 - 温暖的橙米色 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="100%" style="stop-color:#FFE8D6"/>
    </linearGradient>

    <!-- 主色渐变 - 深橙到珊瑚 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E85D04"/>
      <stop offset="100%" style="stop-color:#F48C06"/>
    </linearGradient>

    <!-- 次色 - 深灰 -->
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3436"/>
      <stop offset="100%" style="stop-color:#636E72"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="url(#bgGrad)"/>

  <!-- 连接线网络 - 代表多提供商连接 -->
  <g stroke="#636E72" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 48 128 Q 90 80 128 128" stroke-dasharray="4 4"/>
    <path d="M 128 128 Q 166 176 208 128" stroke-dasharray="4 4"/>
    <path d="M 128 48 Q 128 88 128 128" stroke-dasharray="4 4"/>
    <path d="M 128 128 Q 128 168 128 208" stroke-dasharray="4 4"/>
  </g>

  <!-- 主体 A 字母 - 几何切割风格 -->
  <g fill="url(#mainGrad)">
    <!-- A 的左斜边 -->
    <polygon points="128,52 80,180 96,180 128,100 160,180 176,180"/>
    <!-- A 的横杠 - 不规则位置 -->
    <polygon points="100,148 156,148 150,164 106,164"/>
  </g>

  <!-- 连接节点 - 代表提供商网络 -->
  <g fill="url(#subGrad)">
    <!-- 四角节点 -->
    <circle cx="48" cy="128" r="8"/>
    <circle cx="208" cy="128" r="8"/>
    <circle cx="128" cy="48" r="8"/>
    <circle cx="128" cy="208" r="8"/>

    <!-- 中心节点 - 稍大 -->
    <circle cx="128" cy="128" r="6" fill="#E85D04"/>
  </g>

  <!-- 动态装饰 - 不对称的活跃点 -->
  <g fill="#F48C06" opacity="0.8">
    <circle cx="72" cy="96" r="4"/>
    <circle cx="184" cy="160" r="3"/>
    <circle cx="96" cy="184" r="3"/>
  </g>

  <!-- 微妙的流动线条 -->
  <path d="M 60 100 Q 80 90 100 100" stroke="#E85D04" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 156 156 Q 176 166 196 156" stroke="#E85D04" stroke-width="2" fill="none" opacity="0.5"/>

</svg>

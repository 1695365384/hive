name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install

      - name: Build core
        run: pnpm --filter @bundy-lmw/hive-core build

      - name: Test core
        run: pnpm --filter @bundy-lmw/hive-core test

      - name: Test server (unit only)
        working-directory: apps/server
        run: pnpm exec vitest run tests/unit

      - name: Type check desktop
        run: pnpm --filter @bundy-lmw/hive-desktop exec tsc --noEmit

  # Native builds on each OS — matches Tauri docs (do not cross-compile SQLite/WebView).
  # https://v2.tauri.app/distribute/pipelines/github
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - run: pnpm install

      - name: Build core
        run: pnpm --filter @bundy-lmw/hive-core build

      - name: Build server
        run: pnpm --filter @bundy-lmw/hive-server build

      - name: Bundle server (SEA)
        run: node apps/server/scripts/bundle.mjs

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          # No releaseId → build only (verify compile + package on each OS)
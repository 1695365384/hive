name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Build web artifacts (server + frontend)
  # ============================================
  build-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      - name: Build core
        run: pnpm --filter @bundy-lmw/hive-core build

      - name: Build server
        run: pnpm --filter @bundy-lmw/hive-server build

      - name: Build frontend
        run: pnpm --filter @bundy-lmw/hive-desktop build

      - name: Upload server dist
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: apps/server/dist
          retention-days: 1

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/desktop/dist
          retention-days: 1

  # ============================================
  # Build Tauri on Windows
  # ============================================
  build-windows:
    needs: build-web
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          rustup default stable

      - name: Install deps
        run: pnpm install

      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: server-dist
          path: apps/server/dist

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/desktop/dist

      - name: Build Tauri Rust
        working-directory: ./apps/desktop/src-tauri
        shell: bash
        env:
          TAURI_BUILD_NON_INCREMENTAL: 'true'
        run: |
          # Build Rust binary only, skip frontend build
          cargo build --release

      - name: Bundle MSI
        working-directory: ./apps/desktop/src-tauri
        shell: pwsh
        run: |
          $env:TAURI_SIGNING_PRIVATE_KEY="dummy"
          $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD=""
          # Run just the bundler without full build
          $bundleDir = "target/release/bundle/msi"
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
          # Use tauri bundle directly
          cargo tauri build --bundles msi --no-dev

      - name: Find MSI
        id: msi
        shell: pwsh
        run: |
          $f = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          echo "path=$($f.FullName)" | Out-String -Width 4096

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: hive-desktop-windows-x64
          path: ${{ steps.msi.outputs.path }}
          retention-days: 1

  # ============================================
  # Build Tauri on macOS
  # ============================================
  build-macos:
    needs: build-web
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install Rust
        run: |
          rustup default stable
          rustup target add ${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Install deps
        run: pnpm install

      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: server-dist
          path: apps/server/dist

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/desktop/dist

      - name: Build Tauri Rust
        working-directory: ./apps/desktop/src-tauri
        shell: bash
        env:
          TAURI_BUILD_NON_INCREMENTAL: 'true'
        run: |
          cargo build --release --target ${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Bundle DMG
        working-directory: ./apps/desktop/src-tauri
        shell: bash
        run: |
          cargo tauri build --bundles dmg --target ${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }} --no-dev

      - name: Find DMG
        id: dmg
        shell: bash
        run: |
          find apps/desktop/src-tauri/target -name "*.dmg" -type f | head -1 | xargs -I{} echo "path={}"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: hive-desktop-macos-${{ matrix.arch }}
          path: ${{ steps.dmg.outputs.path }}
          retention-days: 1

  # ============================================
  # Create GitHub Release
  # ============================================
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        shell: bash
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Hive Desktop v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.msi
            artifacts/*.dmg

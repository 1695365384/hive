name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '22'

jobs:
  # ============================================
  # Build frontend (platform-independent)
  # ============================================
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      - name: Build frontend
        working-directory: apps/desktop
        run: npx tsc --noEmit && npx vite build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/desktop/dist
          retention-days: 1

  # ============================================
  # Build Tauri on macOS (SEA binary is platform-specific)
  # ============================================
  build-macos:
    needs: build-frontend
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        run: |
          rustup default stable
          rustup target add ${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Install deps
        run: pnpm install

      - name: Build core (required for esbuild to resolve workspace deps)
        run: pnpm --filter @bundy-lmw/hive-core build

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/desktop/dist

      - name: Build SEA binary
        env:
          SEA_ARCH: ${{ matrix.arch }}
        run: bash apps/server/scripts/bundle.sh

      - name: Build Tauri
        working-directory: apps/desktop
        run: |
          TARGET=${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}
          npx @tauri-apps/cli build --bundles dmg --target "$TARGET" --ci \
            --config '{"build":{"beforeBuildCommand":""}}'

      - name: Debug bundle output
        if: failure()
        run: |
          echo "=== Bundle directory ==="
          find apps/desktop/src-tauri/target -type d -name "bundle" 2>/dev/null
          echo "=== All dmg/app files ==="
          find apps/desktop/src-tauri/target -name "*.dmg" -o -name "*.app" 2>/dev/null || true

      - name: Find DMG
        id: dmg
        run: |
          DMG=$(find apps/desktop/src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG found"
            find apps/desktop/src-tauri/target -name "*.dmg" -o -name "*.app" 2>/dev/null || true
            exit 1
          fi
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: hive-desktop-macos-${{ matrix.arch }}
          path: ${{ steps.dmg.outputs.path }}
          retention-days: 1

  # ============================================
  # Build Tauri on Windows
  # ============================================
  build-windows:
    needs: build-frontend
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          rustup default stable

      - name: Install deps
        run: pnpm install

      - name: Build core (required for esbuild to resolve workspace deps)
        run: pnpm --filter @bundy-lmw/hive-core build

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/desktop/dist

      - name: Build SEA binary
        shell: bash
        run: bash apps/server/scripts/bundle.sh

      - name: Build Tauri
        working-directory: apps/desktop
        shell: bash
        run: |
          npx @tauri-apps/cli build --bundles msi --ci \
            --config '{"build":{"beforeBuildCommand":""}}'

      - name: Find MSI
        id: msi
        shell: pwsh
        run: |
          $f = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle" -Filter "*.msi" -Recurse | Select-Object -First 1
          if ($f) {
            "path=$($f.FullName)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No MSI found, checking for exe..."
            $e = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle" -Filter "*.exe" -Recurse | Select-Object -First 1
            if ($e) {
              "path=$($e.FullName)" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "No MSI or EXE found"
              exit 1
            }
          }

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: hive-desktop-windows-x64
          path: ${{ steps.msi.outputs.path }}
          retention-days: 1

  # ============================================
  # Create GitHub Release
  # ============================================
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        shell: bash
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Hive Desktop v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.msi
            artifacts/*.dmg
